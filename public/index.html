<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoiceCall - WebSocket + WebCodecs</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>
            🎙️ 1v1 语音通话
            <span class="badge">WS + Opus ⚡</span>
            <span class="badge">WebCodecs 🚀</span>
        </h1>

        <div class="info">
            <span>🆔 你的 ID</span>
            <span class="id-value" id="myPeerId">—</span>
        </div>

        <div class="info room-id-info">
            <span>🏠 当前房间</span>
            <span class="room-id-value" id="roomIdDisplay">—</span>
        </div>

        <div class="room-status-section">
            <h3>📡 通话状态</h3>
            <div id="roomStatus">
                <span class="room-status waiting">⏳ 等待加入...</span>
            </div>
        </div>

        <div class="info peer-info" id="peerInfoSection">
            <span>👤 通话对象</span>
            <span class="peer-id-value" id="peerPeerId">—</span>
        </div>

        <div class="status" id="status">⚡ 点击下方按钮加入语音通话</div>

        <div class="btn-group">
            <button id="joinBtn">📞 加入通话</button>
            <button id="leaveBtn" disabled>❌ 断开通话</button>
        </div>


        <div id="debugPanel">
            <h3>🔍 实时状态</h3>
            <div id="debugInfo">等待加入...</div>
        </div>

        <div class="footer-note">
            � WebSocket 直传 · Opus @ 32kbps · AudioWorklet · WebCodecs 原生编解码
            <br>浏览器原生 · 超低延迟
        </div>
    </div>
    <script src="client.js"></script>
</body>
</html>
