<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoiceCall - WebSocket + WebCodecs</title>
    <link rel="stylesheet" href="style.css?v=2">
</head>
<body>
    <div class="container">
        <h1>
            🎙️ 1v1 语音通话
            <span class="badge">WS + Opus ⚡</span>
            <span class="badge">WebCodecs 🚀</span>
        </h1>

        <div class="info room-id-info">
            <span>🏠 当前房间</span>
            <span class="room-id-value" id="roomIdDisplay">—</span>
        </div>

        <div class="room-status-section">
            <h3>📡 通话状态</h3>
            <div id="roomStatus">
                <span class="room-status waiting">☎️ 未加入通话。</span>
            </div>
        </div>

        <div class="info">
            <span>🆔 我的 ID</span>
            <span class="speaking-indicator" id="mySpeakingIndicator" style="display:none;">
                <span class="speaking-dot"></span> 讲话中
            </span>
            <span class="id-value" id="myPeerId">—</span>

        </div>

        <div class="info peer-info" id="peerInfoSection">
            <span>👤 对方ID</span>
            <span class="speaking-indicator" id="peerSpeakingIndicator" style="display:none;">
                <span class="speaking-dot active"></span> 讲话中
            </span>
            <span class="peer-id-value" id="peerPeerId">—</span>
        </div>

        <div class="status" id="status">⚡ 点击下方按钮加入1v1语音通话</div>

        <div class="btn-group">
            <button id="joinBtn">📞 加入通话</button>
            <button id="leaveBtn" disabled>❌ 退出通话</button>
        </div>

        <div id="debugPanel">
            <h3>🔍 实时状态</h3>
            <div id="debugInfo">等待加入...</div>
        </div>

        <div class="footer-note">
            📡 弱网模式 · 8kHz · 16kbps · 60ms帧长 · 480ms抖动缓冲
            <br>WebSocket 直传 · Opus · AudioWorklet · WebCodecs 编解码
        </div>
    </div>
    <script src="client.js?v=2"></script>
</body>
</html>
